name: Hydrox - Beneficios
id: beneficios
size: xl
boxes:
- title: Qué aporta Hydrox
  box:
    cols: 4
    color: dark
    pd: 2
    align: left
  boxes:
  - title: Automatiza la decisión de cuándo bombear
    md: |
      - El sistema decide y actúa solo, cada día.
      - No necesitas programar horarios ni vigilar precios.
  - title: Reduce el coste operativo del bombeo
    md: |
      - Opera siempre en las horas de menor coste total eléctrico.
      - El ahorro se refleja directamente en tu factura.
  - title: Evita depender de una gestión manual diaria
    md: |
      - Hydrox trabaja de forma autónoma sin intervención continua.
      - Adapta la selección de horas al coste real de cada jornada.
  - title: Permite mantener control y supervisión
    md: |
      - Consulta estado, horarios y consumos desde la aplicación.
      - Modifica o anula la programación cuando lo necesites.
