  faqs:
  - title: ¿Qué es Hydrox?
    md: |
      Es un sistema de control para bombeo conectado a red que decide automáticamente las horas de funcionamiento más convenientes según el coste total eléctrico. Tiene en cuenta energía, peajes, cargos y el resto de componentes que afectan al coste real del suministro.
  - title: ¿Cómo funciona?
    md: |
      Analiza los costes del día, calcula el coste total por franja horaria y activa el bombeo en las horas más convenientes para completar el tiempo de bombeo necesario. La lógica se ejecuta de forma automática cada día.
  - title: ¿Necesito energía solar para usarlo?
    md: |
      No. Hydrox está orientado a instalaciones de bombeo conectadas a red. No requiere autoconsumo fotovoltaico para funcionar.
  - title: ¿Tengo que cambiar mi instalación de bombeo?
    md: |
      No. Hydrox se plantea para integrarse en la operativa existente del bombeo sin modificar su lógica de uso. Solo requiere una conexión eléctrica y de comunicación con la bomba.
  - title: ¿Puedo supervisarlo o ajustar su funcionamiento?
    md: |
      Sí. El sistema permite supervisión y ajuste cuando el usuario lo necesita. Desde la aplicación puedes consultar el estado, los horarios de bombeo y modificar la programación automática en cualquier momento.
