<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title-cf">
  <title id="title-cf">Cómo funciona Hydrox — lectura de precio, decisión automática, activación de bomba</title>
  <defs>
    <linearGradient id="cf-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d6fa5"/>
      <stop offset="100%" stop-color="#0d3f6e"/>
    </linearGradient>
    <linearGradient id="cf-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3dd6ef"/>
      <stop offset="100%" stop-color="#0faacb"/>
    </linearGradient>
    <linearGradient id="cf-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2fc98e"/>
      <stop offset="100%" stop-color="#1a9e6e"/>
    </linearGradient>
    <filter id="cf-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0d3f6e" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f5f9fc"/>

  <!-- Timeline track -->
  <rect x="100" y="256" width="600" height="6" rx="3" fill="#dce8f0"/>
  <!-- progress fill -->
  <rect x="100" y="256" width="600" height="6" rx="3" fill="url(#cf-cyan)" opacity="0.5"/>

  <!-- === STEP 1: Lee el precio === -->
  <!-- circle node -->
  <circle cx="200" cy="259" r="22" fill="url(#cf-blue)" filter="url(#cf-shadow)"/>
  <text x="200" y="265" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">1</text>

  <!-- card up -->
  <rect x="108" y="56" width="184" height="176" rx="18" fill="#fff" stroke="#dce8f0" stroke-width="1.5" filter="url(#cf-shadow)"/>
  <!-- connector line -->
  <line x1="200" y1="237" x2="200" y2="234" stroke="#dce8f0" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- card content: price chart -->
  <g transform="translate(130 84)">
    <!-- bars -->
    <rect x="0"   y="50" width="16" height="50"  rx="5" fill="#e2eef5"/>
    <rect x="22"  y="30" width="16" height="70"  rx="5" fill="#e2eef5"/>
    <rect x="44"  y="10" width="16" height="90"  rx="5" fill="url(#cf-cyan)"/>
    <rect x="66"  y="40" width="16" height="60"  rx="5" fill="#e2eef5"/>
    <rect x="88"  y="4"  width="16" height="96"  rx="5" fill="url(#cf-cyan)"/>
    <rect x="110" y="62" width="16" height="38"  rx="5" fill="#e2eef5"/>
    <!-- baseline -->
    <line x1="0" y1="104" x2="128" y2="104" stroke="#dce8f0" stroke-width="1.5"/>
    <!-- legend pill -->
    <rect x="0" y="114" width="80" height="12" rx="6" fill="#e2eef5"/>
  </g>

  <!-- step label -->
  <text x="200" y="302" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0d3f6e" text-anchor="middle">Lee el precio</text>

  <!-- === ARROW 1→2 === -->
  <path d="M310 259 H382" stroke="#dce8f0" stroke-width="2"/>

  <!-- === STEP 2: Decide el momento óptimo === -->
  <circle cx="400" cy="259" r="22" fill="url(#cf-blue)" filter="url(#cf-shadow)"/>
  <text x="400" y="265" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">2</text>

  <!-- card down -->
  <rect x="308" y="288" width="184" height="176" rx="18" fill="#fff" stroke="#dce8f0" stroke-width="1.5" filter="url(#cf-shadow)"/>
  <line x1="400" y1="281" x2="400" y2="288" stroke="#dce8f0" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- card content: algo/brain -->
  <g transform="translate(330 308)">
    <!-- outer ring -->
    <circle cx="76" cy="52" r="46" fill="#eff7fb" stroke="#cde0eb" stroke-width="2"/>
    <circle cx="76" cy="52" r="30" fill="#fff" stroke="#dce8f0" stroke-width="2"/>
    <circle cx="76" cy="52" r="18" fill="url(#cf-blue)"/>
    <!-- bolt inside -->
    <path d="M78 40 l-10 16 h8 l-2 18 11 -20 h-8 z" fill="#3dd6ef"/>
    <!-- orbit dash -->
    <circle cx="76" cy="52" r="46" fill="none" stroke="#8ad5e7" stroke-width="5" stroke-dasharray="8 14" stroke-linecap="round" opacity="0.6"/>
    <!-- row labels -->
    <rect x="0" y="112" width="152" height="12" rx="6" fill="#e2eef5"/>
    <rect x="0" y="132" width="120" height="12" rx="6" fill="url(#cf-cyan)" opacity="0.4"/>
    <rect x="0" y="152" width="90"  height="12" rx="6" fill="#e2eef5"/>
  </g>

  <!-- step label -->
  <text x="400" y="478" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0d3f6e" text-anchor="middle">Decide el momento</text>

  <!-- === ARROW 2→3 === -->
  <path d="M510 259 H578" stroke="#dce8f0" stroke-width="2"/>

  <!-- === STEP 3: Activa la bomba === -->
  <circle cx="600" cy="259" r="22" fill="url(#cf-green)" filter="url(#cf-shadow)"/>
  <!-- checkmark -->
  <path d="M590 259 l7 8 l14 -16" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- card up -->
  <rect x="508" y="56" width="184" height="176" rx="18" fill="#fff" stroke="#dce8f0" stroke-width="1.5" filter="url(#cf-shadow)"/>
  <line x1="600" y1="237" x2="600" y2="234" stroke="#dce8f0" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- card content: pump + notification -->
  <g transform="translate(530 74)">
    <!-- pump body -->
    <rect x="42" y="32" width="56" height="44" rx="14" fill="url(#cf-blue)"/>
    <rect x="52" y="40" width="36" height="12" rx="6" fill="#fff" opacity="0.2"/>
    <circle cx="58" cy="62" r="5" fill="#3dd6ef"/>
    <circle cx="70" cy="62" r="5" fill="#fff" opacity="0.5"/>
    <circle cx="82" cy="62" r="5" fill="#3dd6ef" opacity="0.7"/>
    <!-- pipe down -->
    <rect x="62" y="76" width="16" height="30" rx="5" fill="#cde0eb"/>
    <!-- pipe up -->
    <rect x="62" y="0"  width="16" height="32" rx="5" fill="#cde0eb"/>
    <!-- water drop -->
    <path d="M70 112 C70 112 58 126 58 134 a12 12 0 0 0 24 0 C82 126 70 112 70 112 z" fill="#3dd6ef" opacity="0.8"/>
    <!-- notification badge -->
    <rect x="104" y="10" width="36" height="28" rx="10" fill="url(#cf-green)"/>
    <path d="M114 24 l5 6 l9 -10" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- status row -->
  <g transform="translate(530 164)">
    <rect x="0" y="0" width="140" height="40" rx="12" fill="url(#cf-green)" opacity="0.12"/>
    <circle cx="18" cy="20" r="7" fill="url(#cf-green)"/>
    <rect x="32" y="12" width="80" height="10" rx="5" fill="#b8e6d4"/>
    <rect x="32" y="26" width="52" height="8" rx="4" fill="#d0eddf"/>
  </g>

  <!-- step label -->
  <text x="600" y="302" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0d3f6e" text-anchor="middle">Activa la bomba</text>
</svg>
